route:
  receiver: default
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: pager
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: slack
    - match:
        severity: info
      receiver: dashboard

receivers:
  - name: default
    slack_configs:
      - api_url: "https://hooks.slack.com/services/your-webhook-url"
        channel: "#pms-alerts"
        title: "{{ .GroupLabels.alertname }}"
        text: "{{ .CommonAnnotations.description }}"

  - name: pager
    slack_configs:
      - api_url: "https://hooks.slack.com/services/your-webhook-url"
        channel: "#pms-critical"
        title: "[CRITICAL] {{ .GroupLabels.alertname }}"
        text: "{{ .CommonAnnotations.description }}"

  - name: slack
    slack_configs:
      - api_url: "https://hooks.slack.com/services/your-webhook-url"
        channel: "#pms-alerts"
        title: "{{ .GroupLabels.alertname }}"
        text: "{{ .CommonAnnotations.description }}"

  - name: dashboard
    slack_configs:
      - api_url: "https://hooks.slack.com/services/your-webhook-url"
        channel: "#pms-dashboard"
        title: "[INFO] {{ .GroupLabels.alertname }}"
        text: "{{ .CommonAnnotations.description }}"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["job", "alertname"]
