syntax = "proto3";

option java_multiple_files = true;
option java_package = "patient";

service PatientService {
  rpc GetPatientById(PatientByIdRequest) returns (PatientResponse);
  rpc CreatePatient(CreatePatientRequest) returns (PatientResponse);
}

message PatientByIdRequest {
  string patientId = 1;
}

message CreatePatientRequest {
  string name = 1;
  string email = 3;
  string phone = 4;
  string address = 5;
  string dateOfBirth = 6;
  string gender = 7;
  string bloodType = 8;
  string registeredDate = 9;
}

message PatientResponse {
  string id = 1;
  string patientId = 2;
  string email = 5;
  string address = 6;
  string dateOfBirth = 7;
  string doctorId = 8;
  string name = 9;
  string phone = 10;
  string gender = 11;
}
