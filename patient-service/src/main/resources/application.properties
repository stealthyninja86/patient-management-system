##does checks
spring.sql.init.mode=always

server.port=4000
grpc.server.port=9000
spring.jpa.defer-datasource-initialization=true

logging.level.root=info
logging.level.org.springframework.security=DEBUG

# swagger-ui custom path
springdoc.swagger-ui.path=/swagger-ui.html

#kafka properties
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.retries=2147483647
spring.kafka.producer.properties.retry.backoff.ms=100
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.linger.ms=5

# Same JWT secret as auth-service
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://auth-service:4005


# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://eureka:password@eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.metadata-map.gRPC_port=${grpc.server.port}

#grpc
grpc.client.billing-service.address=discovery:///billing-service
grpc.client.billing-service.negotiation-type=plaintext
grpc.client.notification-service.address=discovery:///notification-service
grpc.client.notification-service.negotiation-type=plaintext

management.endpoints.web.exposure.include=health, prometheus, info
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Resilience4j Circuit Breaker — billingService (deferring fallback)
resilience4j.circuitbreaker.instances.billingService.register-health-indicator=true
resilience4j.circuitbreaker.instances.billingService.sliding-window-size=10
resilience4j.circuitbreaker.instances.billingService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.billingService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.billingService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.billingService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.billingService.slow-call-duration-threshold=500ms
resilience4j.circuitbreaker.instances.billingService.slow-call-rate-threshold=50

#open telemetry
otel.service.name=${spring.application.name}
otel.traces.exporter=zipkin
otel.exporter.zipkin.endpoint=http://zipkin:9411/api/v2/spans
otel.propagation.type=w3c
otel.instrumentation.kafka.enabled=true
otel.instrumentation.grpc.enabled=true
otel.instrumentation.logback-mdc.enabled=true
otel.logs.exporter=none

logging.structured.format.console=logstash
logging.structured.logstash.mdc-fields-include=trace_id,span_id,trace_flags

spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
