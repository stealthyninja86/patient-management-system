groups:
  - name: pms-service-health
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for over 1 minute."

      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate on {{ $labels.job }} is {{ $value | humanizePercentage }} over 5m."

      - alert: CircuitBreakerOpen
        expr: resilience4j_circuitbreaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker OPEN on {{ $labels.job }}"
          description: "Circuit breaker for {{ $labels.instance }} is OPEN."

  - name: pms-business-metrics
    interval: 30s
    rules:
      - alert: LoginAttemptsSpike
        expr: rate(auth_login_attempts_total[5m]) > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Login attempt spike"
          description: "Login rate is {{ $value | humanize }} per second."

      - alert: OTPFailuresHigh
        expr: rate(otp_failed_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High OTP failure rate"
          description: "OTP failures at {{ $value | humanize }} per second."

      - alert: KafkaConsumerLag
        expr: kafka_consumer_lag > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag high"
          description: "Consumer lag is {{ $value }} messages behind."

  - name: pms-resources
    interval: 30s
    rules:
      - alert: HighHeapUsage
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High heap usage on {{ $labels.job }}"
          description: "Heap usage at {{ $value | humanizePercentage }}."

      - alert: HighHeapUsageCritical
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical heap usage on {{ $labels.job }}"
          description: "Heap usage at {{ $value | humanizePercentage }}."
