server:
  port: 4004

auth:
  service:
    url: http://auth-service:4005

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: patient-service
            uri: http://patient-service:4000
            predicates:
              - Path=/api/patients/**
            filters:
              - StripPrefix=1
          - id: api-docs-patient
            uri: http://patient-service:4000
            predicates:
              - Path=/api-docs/patients
            filters:
              - RewritePath=/api-docs/patients,/v3/api-docs
