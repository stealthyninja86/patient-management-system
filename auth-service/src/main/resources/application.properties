spring.application.name=auth-service

server.port=4005

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

logging.level.com.pms.authservice=DEBUG

spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Event publisher: "kafka" or unset (defaults to logging publisher)
registration.event.publisher=kafka

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://eureka:password@eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

# Actuator / Prometheus
management.endpoints.web.exposure.include=health, prometheus, info
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# gRPC Client Discovery — resolve via Eureka
grpc.client.hospital-service.address=discovery:///hospital-service
grpc.client.hospital-service.negotiation-type=plaintext
grpc.client.patient-service.address=discovery:///patient-service
grpc.client.patient-service.negotiation-type=plaintext


# Resilience4j Circuit Breaker — hospitalService (throwing fallback for doctor registration)
resilience4j.circuitbreaker.instances.hospitalService.register-health-indicator=true
resilience4j.circuitbreaker.instances.hospitalService.sliding-window-size=5
resilience4j.circuitbreaker.instances.hospitalService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.hospitalService.failure-rate-threshold=30
resilience4j.circuitbreaker.instances.hospitalService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.hospitalService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.hospitalService.slow-call-duration-threshold=500ms
resilience4j.circuitbreaker.instances.hospitalService.slow-call-rate-threshold=30

# Resilience4j Circuit Breaker — patientService (throwing fallback for patient registration)
resilience4j.circuitbreaker.instances.patientService.register-health-indicator=true
resilience4j.circuitbreaker.instances.patientService.sliding-window-size=5
resilience4j.circuitbreaker.instances.patientService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.patientService.failure-rate-threshold=30
resilience4j.circuitbreaker.instances.patientService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.patientService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.patientService.slow-call-duration-threshold=500ms
resilience4j.circuitbreaker.instances.patientService.slow-call-rate-threshold=30
resilience4j.circuitbreaker.circuit-breaker-aspect-order=1
resilience4j.retry.retry-aspect-order=2

# Kafka producer resilience
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.retries=2147483647
spring.kafka.producer.properties.retry.backoff.ms=100
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.linger.ms=5
spring.kafka.producer.properties.compression.type=lz4

#open telemetry
otel.service.name=${spring.application.name}
otel.traces.exporter=zipkin
otel.exporter.zipkin.endpoint=http://zipkin:9411/api/v2/spans
otel.propagation.type=w3c
otel.instrumentation.kafka.enabled=true
otel.instrumentation.grpc.enabled=true
otel.instrumentation.logback-mdc.enabled=true
otel.logs.exporter=none

logging.structured.format.console=logstash
logging.structured.logstash.mdc-fields-include=trace_id,span_id,trace_flags

# Event publisher: "kafka" or unset (defaults to logging publisher)
# registration.event.publisher=kafka

spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
