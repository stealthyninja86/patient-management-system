input {
    tcp {
       port => 5000
       codec => json # Receives clean JSON from Logback TCP appender
        }
    }
    udp{
        port => 5000
        codec => json # Receives GELF from Docker driver; json codec fails on envelope
    }
    filter{
    # If the message arrived via GELF (envelope detected), extract the inner JSON
        if [short_message] {
            json {
                source => "short_message"
                target => "app"
            }
            mutate {
                copy => { "[app] [@timestamp]" => "@timestamp" }
                copy => { "[app][level]" => "level" }
                copy => { "[app][message]" => "message" }
                copy => { "[app][logger_name]" => "logger_name" }
                copy => { "[app][thread_name]" => "thread_name" }
                copy => { "[app][mdc]" => "mdc" }
            }
        }
         if [mdc] {
            mutate {
              convert => { "[mdc][traceId]" => "string" }
              convert => { "[mdc][spanId]" => "string" }
            }
         }

         # Derive service name from Docker container name (always available with GELF)
         if ![service] {
           mutate {
               add_field => { "service" => "%{[host]}" }
           }
           # Or from the container name label
           mutate {
             gsub => [ "host", "-service$", "-service" ]
           }
         }
    }
}